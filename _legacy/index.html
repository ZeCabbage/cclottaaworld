<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccllottaaWorld — Your World Awaits</title>
  <meta name="description"
    content="Welcome to ccllottaaWorld! Create your character, explore the city, shop for outfits, and play mini-games in this retro 2000s virtual world!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Comic+Neue:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="src/styles/index.css?v=4">
  <link rel="stylesheet" href="src/styles/browser.css?v=4">
  <link rel="stylesheet" href="src/styles/retro.css?v=4">
  <link rel="stylesheet" href="src/styles/shops.css?v=4">
  <link rel="stylesheet" href="src/styles/creatures.css?v=4">
</head>

<body>
  <!-- Retro tiled background -->
  <div id="bg-pattern"></div>

  <!-- Faux Browser Window -->
  <div id="browser-window">
    <!-- Title Bar -->
    <div id="title-bar">
      <div id="title-bar-icon">🌟</div>
      <div id="title-bar-text">ccllottaaWorld — Internet Explorer</div>
      <div id="title-bar-buttons">
        <button class="tb-btn minimize" title="Minimize">_</button>
        <button class="tb-btn maximize" title="Maximize">□</button>
        <button class="tb-btn close" title="Close">✕</button>
      </div>
    </div>

    <!-- Menu Bar -->
    <div id="menu-bar">
      <span class="menu-item">File</span>
      <span class="menu-item">Edit</span>
      <span class="menu-item">View</span>
      <span class="menu-item">Favorites ★</span>
      <span class="menu-item">Tools</span>
      <span class="menu-item">Help</span>
    </div>

    <!-- Navigation Bar -->
    <div id="nav-bar">
      <div id="nav-buttons">
        <button class="nav-btn" id="btn-back" title="Back">◀</button>
        <button class="nav-btn" id="btn-forward" title="Forward">▶</button>
        <button class="nav-btn" id="btn-refresh" title="Refresh">🔄</button>
        <button class="nav-btn" id="btn-home" title="Home">🏠</button>
      </div>
      <div id="address-bar">
        <label id="address-label">Address</label>
        <div id="address-input">
          <span id="address-icon">🌐</span>
          <span id="address-text">http://www.ccllottaaWorld.com/</span>
        </div>
        <button id="go-btn">Go</button>
      </div>
    </div>

    <!-- Links Bar -->
    <div id="links-bar">
      <span class="link-item">🧍 My Profile</span>
      <span class="link-item">🗺️ Town Map</span>
      <span class="link-item">🎒 Inventory</span>
      <span class="link-item">💰 <span id="coin-display">500</span> ccllottaaCoins</span>
      <span class="link-item" id="pet-status-bar">📊 Profile</span>
    </div>

    <!-- Main Viewport -->
    <div id="viewport">
      <div id="screen-container">
        <!-- Screens get rendered here -->
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <div id="status-left">
        <span id="status-icon">✅</span>
        <span id="status-text">Done</span>
      </div>
      <div id="status-right">
        <span id="visitor-counter">Visitors: <img src="" alt="" style="display:none"> <span
            class="counter-num">004,829</span></span>
        <span id="status-zone">Internet Zone</span>
      </div>
    </div>
  </div>

  <!-- Three.js (local r128) -->
  <script src="src/lib/three.min.js"></script>
  <script src="src/lib/OrbitControls.js"></script>

  <!-- Engine Scripts -->
  <script src="src/engine/pixelIcons.js?v=7"></script>
  <script src="src/engine/state.js?v=7"></script>
  <script src="src/engine/pet.js?v=7"></script>
  <script src="src/engine/inventory.js?v=7"></script>
  <script src="src/engine/save.js"></script>
  <script src="src/engine/creatureRenderer.js?v=7"></script>
  <script src="src/engine/voxelEngine.js"></script>
  <script src="src/engine/voxelCreatures.js?v=7"></script>
  <script src="src/engine/voxelTown.js?v=7"></script>

  <!-- Screen Scripts -->
  <script src="src/screens/title.js?v=7"></script>
  <script src="src/screens/select.js?v=7"></script>
  <script src="src/screens/town.js?v=7"></script>
  <script src="src/screens/petView.js?v=7"></script>
  <script src="src/screens/shopFashion.js?v=7"></script>
  <script src="src/screens/shopArcade.js?v=7"></script>
  <script src="src/screens/shopPark.js?v=8"></script>
  <script src="src/screens/shopFortune.js?v=9"></script>
  <script src="src/screens/shopVinyl.js?v=9"></script>
  <script src="src/screens/shopWork.js?v=9"></script>
  <script src="src/screens/shopCafe.js?v=9"></script>
  <script src="src/screens/shopGarden.js?v=9"></script>
  <script src="src/screens/apartment.js?v=9"></script>
  <script src="src/main.js?v=9"></script>
</body>

</html>
